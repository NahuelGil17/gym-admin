<div class="card-3d slide-fade-effect p-6 text-white rounded-xl shadow-2xl transition-all duration-300 hover:scale-105"
  [ngStyle]="cardStyle">
  <div class="backgroundTitle rounded-xl mb-4" [ngStyle]="cardStyle">
    <h2 class="text-3xl font-black text-center text-white drop-shadow-lg">
      {{ routine.name }}
    </h2>
  </div>

  <div class="bg-white/20 backdrop-blur-sm rounded-xl p-4 space-y-4">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      @for (exercise of routine.exercisesRoutines; track exercise.id) {
      <div class="bg-white/20 backdrop-blur-sm rounded-lg p-3 border border-white/30">
        <h3 #exerciseText class="text-lg font-bold text-white mb-2 drop-shadow-sm">
          {{ exercise.exercise.name }}
        </h3>
        <ul #exerciseList class="text-sm text-white/90 space-y-1 hide-scrollbar">
          <li class="flex justify-between items-center">
            <span>Series:</span>
            <span class="font-semibold">{{ exercise.series }}</span>
          </li>
          <li class="flex justify-between items-center">
            <span>Repeticiones:</span>
            <span class="font-semibold">{{ exercise.repetitions }}</span>
          </li>
          <li class="flex justify-between items-center">
            <span>Peso:</span>
            <span class="font-semibold">{{ exercise.weight }} kg</span>
          </li>
          <li class="flex justify-between items-center">
            <span>Descanso:</span>
            <span class="font-semibold">{{ exercise.rest }} seg</span>
          </li>
        </ul>
      </div>
      }
    </div>
  </div>
</div>
